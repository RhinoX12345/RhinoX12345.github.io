<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Celeste Store</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="store.css">
    <script>
        function doSubmit() {
            if (!validateText()) {
                alert("Your Smigza order is incomplete, do it again sigma");
                return;
            }
            alert("Your smegc order has been submitted. Kindly wait 24 business hours to receive the pizzaz.");
        }

        function validateText() {
            valid = true;
            for (let i of document.getElementsByClassName("required")){
                valid = valid && !!i.value;
            }
            console.log(valid)
            return valid;
        }
    </script>
</head>

<body>
    <div class="header">
        <div><a href="character.html"><div class="text-nav" href="character.html">Characters</div></a></div>
        <div><a href="gameplay.html"><div class="text-nav">Gameplay</div></a></div>
        <div><a href="index.html"><img class="img-nav" src="logo-raster-celeste-2.png"></a></div>
        <div><a href="store.html"><div class="text-nav">Shop</div></a></div>
        <div><a href="community.html"><div class="text-nav">Community</div></a></div>
    </div>
    <div class="store">
        <div class="store-header">BUY NOW shdioasidjwa</div>
        <div class="links">
            <a href="https://store.steampowered.com/app/504230/Celeste/">
                <img class="images" src="Steam.png">
            </a>
            <a href="https://www.playstation.com/en-ca/games/celeste/">
                <img class="images" src="Playstation.png">
            </a>
            <a href="https://www.xbox.com/en-ca/games/store/celeste/bwmql2rpwbhb">
                <img class="images" src="XBOX.png">
            </a>
            <a href="https://store.epicgames.com/en-US/p/celeste">
                <img class="images" src="EpicGames.png">
            </a>
            <a href="https://www.nintendo.com/us/store/products/celeste-switch/">
                <img class="images" src="Switch.png">
            </a>
        </div>
        <div class="form">
            <form name="forms" action="">
                <h1>Give us YOUR thoughts regarding this game!</h1>

                <h4>Enter your name, address, and phone number:</h4>
                <table class="user-identity">
                    <tr>
                        <td><label>Name:</label></td>
                        <td><input class="input required" type="text" name="customer" size="50"></td>
                    </tr>
                    <tr>
                        <td><label>Address:</label></td>
                        <td><input class="input required" type="text" name="address" size="50"></td>
                    </tr>
                    <tr>
                        <td><label>City:</label></td>
                        <td><input class="input required" type="text" name="city" size="50"></td>
                    </tr>
                    <tr>
                        <td><label>State:</label></td>
                        <td><input class="input required" type="text" name="state" size="50"></td>
                    </tr>
                    <tr>
                        <td><label>ZIP:</label></td>
                        <td><input class="input required" type="text" name="zip" size="50"></td>
                    </tr>
                    <tr>
                        <td><label>Phone:</label></td>
                        <td><input class="input required" type="text" name="number" size="50"></td>
                    </tr>
                </table>

                <h4>What do you think of the game?</h4>
                <div class="layout-flex-down">
                    <label><input class="input" type="radio" name="opinion" value="meh"> It's meh..</label>
                    <label><input class="input" type="radio" name="opinion" value="normal"> Normal game like the others</label>
                    <label><input class="input" type="radio" name="opinion" value="cool"> Very cool!</label>
                </div>

                <h4>What would you like to see in future updates?</h4>
                <div class="layout-flex-down">
                    <div><input class="input" type="checkbox" name="features" value="characters"><label>More characters</label></div>
                    <div><input class="input" type="checkbox" name="features" value="difficulty"><label>Harder levels</label></div>
                    <div><input class="input" type="checkbox" name="features" value="graphics"><label>IMPROVED graphics</label></div>
                    <div><input class="input" type="checkbox" name="features" value="story"><label>More depth in storyline</label></div>
                    <div><input class="input" type="checkbox" name="features" value="collectibles"><label>More strawberries</label><br></div>
                    <div><label>Other: </label><input class="input" type="text" name="custom_feature"></div>
                </div>
                <br>
                <br>
                <input type="button" value="Submit Order" onclick="doSubmit()">
                <input type="reset" value="Clear Entries">
            </form>
        </div>
    </div>

</body>

</html>
